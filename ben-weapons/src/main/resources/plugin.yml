name: BenWeapons
version: 1.3.4
main: com.benserver.weapons.BenWeaponsPlugin
api-version: '1.21'
description: Custom craftable weapons exclusive to Ben's server!
author: Ben (with a little help from Claude!)

commands:
  benweapons:
    description: Give a custom weapon to a player (admin only)
    usage: /benweapons <sword|axe|mace> [player]
    permission: benweapons.give
  benweapons-sword:
    description: Activate the Fire Blitz Sword ability
    usage: /benweapons-sword ability activate
    aliases: [sword, bsword]
    permission: benweapons.sword
  benweapons-trust:
    description: Trust a player so your weapons won't harm them
    usage: /benweapons-trust <player>
    aliases: [trust, wtrust]
    permission: benweapons.trust
  benweapons-untrust:
    description: Revoke trust from a player
    usage: /benweapons-untrust <player>
    aliases: [untrust, wuntrust]
    permission: benweapons.trust

permissions:
  benweapons.give:
    description: Allows giving custom weapons to players
    default: op
  benweapons.sword:
    description: Allows using /sword ability activate
    default: true
  benweapons.trust:
    description: Allows using /trust and /untrust
    default: true
