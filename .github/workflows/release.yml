name: Build & Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn clean package -q -f ben-weapons/pom.xml

      - name: Read version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -f ben-weapons/pom.xml -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release already exists
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy JAR to root
        run: cp -f ben-weapons/target/BenWeapons.jar BenWeapons.jar

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" BenWeapons.jar \
            --title "BenWeapons v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update existing release asset
        if: steps.check_release.outputs.exists == 'true'
        run: |
          gh release upload "v${{ steps.version.outputs.version }}" BenWeapons.jar --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
