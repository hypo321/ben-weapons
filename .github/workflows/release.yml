name: Build & Release

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Derive version
        id: version
        run: |
          BASE=$(mvn help:evaluate -f ben-weapons/pom.xml -Dexpression=base.version -q -DforceStdout)
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package resource pack
        run: |
          cd resourcepack
          zip -r ../BenWeapons-ResourcePack.zip .
          cd ..

      - name: Calculate resource pack SHA-1
        id: rp_sha1
        run: |
          SHA1=$(sha1sum BenWeapons-ResourcePack.zip | awk '{print $1}')
          echo "sha1=$SHA1" >> $GITHUB_OUTPUT

      - name: Build JAR
        run: |
          mvn clean package -q -f ben-weapons/pom.xml \
            -Dbuild.number=${{ github.run_number }} \
            -Dresource.pack.sha1=${{ steps.rp_sha1.outputs.sha1 }}

      - name: Verify version and SHA-1 in JAR
        run: |
          unzip -p ben-weapons/target/BenWeapons.jar plugin.yml | grep -E "^version|^resource-pack-sha1"

      - name: Create GitHub Release
        run: |
          cp -f ben-weapons/target/BenWeapons.jar BenWeapons.jar
          SHA1=${{ steps.rp_sha1.outputs.sha1 }}
          gh release create "v${{ steps.version.outputs.version }}" \
            BenWeapons.jar \
            BenWeapons-ResourcePack.zip \
            --title "BenWeapons v${{ steps.version.outputs.version }}" \
            --notes "$(cat <<EOF
## Installation

### Plugin
Drop \`BenWeapons.jar\` into your server's \`plugins/\` folder and restart.

### Resource Pack
Add these lines to \`server.properties\` (one-time setup — the URL never changes):
\`\`\`
resource-pack=https://github.com/hypo321/ben-weapons/releases/latest/download/BenWeapons-ResourcePack.zip
resource-pack-sha1=${SHA1}
resource-pack-prompt={"text":"Install Ben's Forbidden Weapons textures!","color":"gold"}
resource-pack-required=false
\`\`\`
> Update \`resource-pack-sha1\` to the value above each time you install a new version — this forces players to redownload the updated pack.
EOF
)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
